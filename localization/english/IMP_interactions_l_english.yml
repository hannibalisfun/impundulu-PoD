l_english:
 ### ==========================================
 ### KNOWLEDGE EXCHANGE DECISION
 ### ==========================================

 imp_knowledge_exchange_decision: "Exchange Necromantic Knowledge"
 imp_knowledge_exchange_decision_tooltip: "Seek out a necromantic vampire willing to exchange secrets of the grave. Requires a valid target and 500 prestige."
 imp_knowledge_exchange_decision_desc: "The Impundulu have always traveled seeking the knowledge of death held by other bloodlines. Seek out a necromantic vampire willing to exchange secrets of the grave."
 imp_knowledge_exchange_decision_confirm: "Begin the search"
 imp_requires_exchange_target_tt: "A necromantic vampire with positive opinion of you must exist"

 ### ==========================================
 ### KNOWLEDGE EXCHANGE EVENTS
 ### ==========================================

 ### Event 1: The Approach
 IMP_exchange.1.t: "The Exchange of the Dead"
 IMP_exchange.1.desc: "We sit across from one another — two scholars of the grave, divided by blood but united by curiosity. The offer has been made. Now we must determine the price.\n\nWhat do we offer in return for their knowledge of death?"
 IMP_exchange.1.a: "Gold. The universal solvent."
 IMP_exchange.1.b: "A favor. I owe them one."
 IMP_exchange.1.c: "Our own secrets. The Cenotaph and Haunting paths."
 IMP_exchange_offer_gold_tt: "You will pay 200 gold for the necromantic knowledge."
 IMP_exchange_offer_favor_tt: "You will owe them a favor (hook) in exchange for the knowledge."
 IMP_exchange_offer_secrets_tt: "You will share Impundulu necromancy secrets in exchange. They gain access to Cenotaph/Haunting paths."

 ### Event 2: The Outcome
 IMP_exchange.2.t: "Knowledge Exchanged"
 IMP_exchange.2.desc: "The exchange is complete. Nights of careful discussion, shared rituals, and guarded demonstrations have borne fruit. We have glimpsed their approach to the necromantic arts — a perspective different from our own, yet undeniably powerful.\n\nA new path of death opens before us."
 IMP_exchange.2.a: "The dead speak in many tongues. Now I understand one more."

 IMP_exchange_success_tt: "You learn the target's necromancy path at level 1. They gain a 'Fellow Scholar of Death' opinion modifier toward you."
 IMP_learned_giovanni_necromancy_tt: "You have learned the Giovanni school of Necromancy."
 IMP_learned_cappadocian_necromancy_tt: "You have learned the Cappadocian school of Necromancy."
 IMP_learned_harbinger_necromancy_tt: "You have learned the Harbinger school of Necromancy."
 IMP_learned_lamia_necromancy_tt: "You have learned the Lamia school of Necromancy."
 IMP_learned_nagaraja_necromancy_tt: "You have learned the Nagaraja school of Necromancy."
 IMP_learned_rosselini_necromancy_tt: "You have learned the Rosselini school of Necromancy."
