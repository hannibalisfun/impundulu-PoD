l_english:
 ### ==========================================
 ### MAJOR OBJECTIVE: Cure the Withering Blood
 ### ==========================================

 imp_withering_blood_objective_decision: "Cure the Withering Blood"
 imp_withering_blood_objective_decision_tooltip: "The Bomkazi mortal line — our covenant partners, our sustenance — is failing. Each generation carries less of the old life-magic. We must find a way to save them or transcend our dependency."
 imp_withering_blood_objective_decision_desc: "For centuries, the covenant between Impundulu and Bomkazi has sustained us. But the mortal witches grow fewer and weaker. The life-magic that once burned in their veins dims to embers.\n\nWe have traveled far, learned from Cappadocians and Giovanni alike. With the necromantic knowledge we have gathered, two paths open before us: renew the ancient covenant through ritual, or break free from it entirely through the Ishologu Rite."
 imp_withering_blood_objective_decision_confirm: "The time has come."
 imp_withering_blood_objective_decision_effect_tooltip: "You will choose between renewing the Bomkazi covenant or performing the Ishologu Rite to free your bloodline from its dependency."

 imp_withering_blood_extra_necromancy_tt: "Has learned at least one necromancy path beyond Cenotaph and Haunting"
 imp_guardian_necromancy_level_tt: "Has Necromancy level 2 or higher"
 imp_guardian_bomkazi_died_tt: "A Bomkazi courtier has died recently"

 ### ==========================================
 ### MINI-OBJECTIVE: Guardian of the Passage
 ### ==========================================

 imp_guardian_passage_decision: "Guardian of the Passage"
 imp_guardian_passage_decision_tooltip: "When a Bomkazi witch dies, it falls to the Impundulu to guide her soul safely to the afterlife. This is our sacred duty — the obligation that defines us."
 imp_guardian_passage_decision_desc: "A Bomkazi has fallen. The covenant demands that we perform the funeral rites — guiding her spirit through the passage between worlds. This is what we are. This is what we do.\n\nThe rites will require necromantic skill."
 imp_guardian_passage_decision_confirm: "We will honor the dead."
 imp_guardian_passage_decision_effect_tooltip: "You will perform funeral rites for the fallen Bomkazi, triggering the search for a new Bomkazi and gaining stress relief."

 ### ==========================================
 ### OBJECTIVE COMPLETION EVENTS
 ### ==========================================

 IMP_objectives.1.t: "Cure the Withering Blood"
 IMP_objectives.1.desc: "The knowledge is complete. The rituals are prepared. After centuries of searching, two paths lie before us — each offering salvation of a different kind.\n\nWe can renew the ancient covenant, binding Impundulu and Bomkazi together for eternity through a ritual of life and death intertwined. Or we can perform the Ishologu Rite, severing the dependency forever and transforming into something new — the Mla Watu, free but alone."
 IMP_objectives.1.a: "Renew the Covenant. Life and Death, together forever."
 IMP_objectives.1.custom_a: "Your dynasty gains the 'Covenant of Life and Death' modifier. Wraith effectiveness is strengthened. The Bomkazi bond endures."
 IMP_objectives.1.b: "Perform the Ishologu Rite. Break the chains."
 IMP_objectives.1.custom_b: "You gain the 'Ishologu' modifier. Your feeding restriction is removed, but the Bomkazi bond is severed."

 ### Observer event
 IMP_objectives.2.t: "The Impundulu's Choice"
 IMP_objectives.2.desc: "Word reaches us that the Impundulu bloodline has made a pivotal decision regarding their ancient covenant with the Bomkazi witches. The balance between life and death shifts."
 IMP_objectives.2.a: "Interesting..."

 ### Mini-objective events
 IMP_objectives.10.t: "Guardian of the Passage"
 IMP_objectives.10.desc: "The drums beat. The spirits gather. The Bomkazi witch lies still, her life-magic fading like the last light of dusk.\n\nIt falls to us to guide her soul — through the passage, past the hungry dead, to whatever waits beyond. This is the oldest obligation of the Impundulu. The covenant demands it."
 IMP_objectives.10.a: "I guide her with honor. The spirits will know our devotion."
 IMP_objectives.10.b: "I guide her in silence. Let the dead keep their counsel."

 ### ==========================================
 ### ARTIFACT CRAFTING DECISIONS (Prompt 8)
 ### ==========================================

 imp_craft_shewstone_decision: "Craft a Shew-Stone"
 imp_craft_shewstone_decision_tooltip: "Consecrate a polished stone and paint it with bird's blood. Spirits will whisper the secrets of those named upon it."
 imp_craft_shewstone_decision_desc: "The Shew-Stone is a tradition older than the bloodline itself — a consecrated stone painted with a name in bird's blood. When the name is spoken, restless spirits whisper the named person's whereabouts and secrets.\n\nThe Cenotaph Path provides the knowledge to bind spirits to the stone."
 imp_craft_shewstone_decision_confirm: "Begin the ritual."

 imp_craft_nightmare_drums_decision: "Craft Nightmare Drums"
 imp_craft_nightmare_drums_decision_tooltip: "Fashion drums from human skin. Inaudible to the living, they compel spirits to torment a rival's dreams."
 imp_craft_nightmare_drums_decision_desc: "The Nightmare Drums are fashioned from human skin stretched over bone. No living ear can hear their rhythm — but the dead hear, and obey.\n\nStruck at midnight, the drums command ghosts to invade a rival's dreams, filling their sleep with terror and dread."
 imp_craft_nightmare_drums_decision_confirm: "Fashion the instruments of dread."

 imp_craft_witch_eye_decision: "Craft the Witch Eye"
 imp_craft_witch_eye_decision_tooltip: "Implant an enchanted eye from a restless corpse into your own socket. The cost is your appearance; the reward is permanent Deathsight."
 imp_craft_witch_eye_decision_desc: "The Witch Eye is the most extreme of Impundulu rituals. An eye is harvested from a restless corpse, enchanted with necromantic power, and implanted in the necromancer's own socket.\n\nThe price is terrible — the enchanted eye marks its bearer as something inhuman. But the gift of permanent Deathsight, the ability to see spirits and pierce all deception, is beyond value."
 imp_craft_witch_eye_decision_confirm: "I accept the price."
