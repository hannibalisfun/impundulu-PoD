 ### House Modifiers
 ### NOTE: dynn_impundulu_modifier and _desc are defined by PoD — do not duplicate here

 dynn_impundulu_improved_modifier: "Impundulu — Keepers of the Passage"
 dynn_impundulu_improved_modifier_desc: "Having performed the sacred funeral rites, the Impundulu have strengthened their bond with the spirit world. The burden of their covenant weighs less heavily."

 ### Objective Reward Modifiers
 covenant_of_life_and_death_modifier: "Covenant of Life and Death"
 covenant_of_life_and_death_modifier_desc: "Through ancient necromantic rites, the Impundulu have renewed their covenant with the Bomkazi line. The bond between living witch and undead necromancer is stronger than ever."

 ishologu_modifier: "The Ishologu"
 ishologu_modifier_desc: "Having broken the ancient pact through the Ishologu Rite, this vampire is no longer bound to the Bomkazi witches. Free from the feeding restriction, but severed from the life-magic that once sustained them."

 ### Opinion Modifiers
 fellow_scholar_of_death_modifier: "Fellow Scholar of Death"
 fellow_scholar_of_death_modifier_desc: "We have exchanged knowledge of the necromantic arts. There is respect between scholars of the grave."

 ### Event Modifiers
 memory_of_bomkazi_modifier: "Memory of Bomkazi"
 memory_of_bomkazi_modifier_desc: "The memory of Bomkazi, the first witch-wife, lingers still. Her sacrifice echoes through the ages."

 withering_blood_urgency_modifier: "The Withering Blood"
 withering_blood_urgency_modifier_desc: "The Bomkazi line grows weaker with each generation. Something must be done before the mortal witches are gone entirely."

 ### Trigger Tooltips
 IMP_has_bomkazi_courtier_tt: "Has a Bomkazi witch in your court"
 IMP_is_necromantic_vampire_tt: "Has knowledge of Necromancy"
 IMP_can_craft_artifact_tt: "Is an Impundulu vampire with necromantic knowledge"
 IMP_has_completed_withering_blood_tt: "Has completed the 'Cure the Withering Blood' objective"
 IMP_is_valid_exchange_target_tt: "Is a non-Impundulu vampire with Necromancy and positive opinion"
