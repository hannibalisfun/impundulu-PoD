l_english:
 ### ==========================================
 ### BOMKAZI CULTIVATION EVENTS
 ### ==========================================

 ### Event 1: Cultivation Initiation
 IMP_bomkazi.1.t: "The Call of the Bomkazi"
 IMP_bomkazi.1.desc: "The ancient covenant between our blood and the Bomkazi witches demands renewal. A new companion must be found — one whose veins carry the spark of life-magic, who can walk beside us as partner and sustenance both.\n\nThe search will take time and effort, but without a Bomkazi at our side, we are diminished."
 IMP_bomkazi.1.a: "Begin the search at once."
 IMP_bomkazi.1.b: "The time is not yet right."
 IMP_bomkazi.1.c: "I have no need of a witch."
 IMP_bomkazi_start_cultivation_tt: "You will begin seeking a mortal with life-magic potential to cultivate as a Bomkazi companion."
 IMP_bomkazi_delay_cultivation_tt: "You will be reminded of this opportunity in 20-40 years."
 IMP_bomkazi_refuse_cultivation_tt: "You refuse the cultivation. The covenant weakens."

 ### Event 2: Quality Selection
 IMP_bomkazi.2.t: "The Shape of the Gift"
 IMP_bomkazi.2.desc: "What manner of Bomkazi do we seek? The life-magic manifests differently in each mortal who carries its seed. Some channel it through intellect and study, others through the body's own resilience, and a rare few see beyond the veil itself.\n\nThe search must be guided by our needs."
 IMP_bomkazi.2.a: "Seek a scholar — one whose mind burns bright."
 IMP_bomkazi.2.b: "Seek a healer — one whose touch mends flesh."
 IMP_bomkazi.2.c: "Seek a seer — one who peers beyond the veil."
 IMP_bomkazi_seek_scholar_tt: "The cultivation will favor intellect and learning. Your search will take 5-15 years."
 IMP_bomkazi_seek_healer_tt: "The cultivation will favor health and resilience. Your search will take 5-15 years."
 IMP_bomkazi_seek_seer_tt: "The cultivation will favor mystic sight and intuition. Your search will take 5-15 years."

 ### Event 3: Hidden creation (option text never shown)
 IMP_bomkazi.3.a: "The search continues..."

 ### Event 4: Success
 IMP_bomkazi.4.t: "A Bomkazi Found"
 IMP_bomkazi.4.desc: "The search has borne fruit. A young woman stands before us, her blood singing with the old power. She has been tested and trained, and the life-magic runs true in her veins.\n\nShe will be our companion, our anchor to the living world. The covenant endures."
 IMP_bomkazi.4.a: "Welcome, sister of the covenant."
 IMP_bomkazi_witch_arrives_tt: "A fully cultivated Bomkazi witch joins your court as a friend and companion."

 ### Event 5: Partial Success
 IMP_bomkazi.5.t: "An Apprentice's Promise"
 IMP_bomkazi.5.desc: "The candidate shows promise, but the life-magic within her is dim — a guttering flame where there should be a bonfire. She could serve as a Bomkazi apprentice, learning the old ways, though she may never reach the full power of the witches of old.\n\nIt is something. It may have to be enough."
 IMP_bomkazi.5.a: "She will grow in time. Welcome her."
 IMP_bomkazi.5.b: "Not good enough. I will wait."
 IMP_bomkazi_apprentice_arrives_tt: "A Bomkazi apprentice joins your court. Her powers are weaker than a full Bomkazi witch."

 ### Event 6: Failure
 IMP_bomkazi.6.t: "The Search Falters"
 IMP_bomkazi.6.desc: "Years of searching have yielded nothing. Every candidate tested, every mortal examined — none carry the spark of life-magic strongly enough to be cultivated. The Bomkazi bloodline thins with each generation.\n\nPerhaps the next search will prove more fruitful. Or perhaps the old ways are truly dying."
 IMP_bomkazi.6.a: "We will try again. The covenant demands it."
 IMP_bomkazi.6.b: "The Bomkazi line is failing..."

 ### ==========================================
 ### TRAIT LOCALIZATION
 ### ==========================================

 trait_bomkazi_witch: "Bomkazi Witch"
 trait_bomkazi_witch_desc: "A mortal life-witch cultivated by the Impundulu. The Bomkazi carry the spark of life-magic in their blood, serving as spiritual companions and sustenance for their undead partners."
 trait_bomkazi_witch_character_desc: "This mortal carries the full power of the Bomkazi life-witches, cultivated through ancient rites to serve as companion to the Impundulu."

 trait_bomkazi_apprentice: "Bomkazi Apprentice"
 trait_bomkazi_apprentice_desc: "A mortal with some life-magic potential, but not fully cultivated. The power in their blood is dim compared to a true Bomkazi witch."
 trait_bomkazi_apprentice_character_desc: "This mortal shows traces of life-magic talent, though the power has not fully manifested. An apprentice in the Bomkazi tradition."

 ### ==========================================
 ### EFFECT TOOLTIPS
 ### ==========================================

 IMP_covenant_renewed_reward_tt: "Your dynasty gains the 'Covenant of Life and Death' modifier, strengthening necromancy, health, and Wraith effectiveness."
 IMP_ishologu_rite_reward_tt: "You gain the 'Ishologu' modifier, removing your feeding restriction but severing the Bomkazi bond."
 IMP_upgrade_house_modifier_tt: "House Impundulu's modifier is upgraded — maluses removed, new bonuses added."

 ### ==========================================
 ### ARTIFACT CRAFTING EVENTS
 ### ==========================================

 ### Shew-Stone
 IMP_artifacts.1.t: "The Shew-Stone Rite"
 IMP_artifacts.1.desc: "The stone is polished smooth and laid upon a grave. With bird's blood we paint the name of the one we would watch. The spirits stir, drawn to the stone like moths to flame.\n\nWhen the rite is complete, the stone hums faintly in our palm. Wherever the named one goes, the whispers will follow."
 IMP_artifacts.1.a: "The dead see all. Now, so do I."
 IMP_shewstone_crafted_tt: "You have crafted a Shew-Stone. It grants bonuses to Intrigue and scheme discovery."

 ### Nightmare Drums
 IMP_artifacts.2.t: "The Drums of Dread"
 IMP_artifacts.2.desc: "Human skin stretched over bone. The drumsticks carved from a hanged man's ribs. When struck, no living ear perceives the sound — but the dead hear, and they obey.\n\nThe spirits bound to these drums will carry nightmares to any sleeper we name."
 IMP_artifacts.2.a: "Let the living know the terror of the dead."
 IMP_nightmare_drums_crafted_tt: "You have crafted Nightmare Drums. They generate monthly dread and boost hostile scheme power."

 ### Witch Eye
 IMP_artifacts.3.t: "The Price of Sight"
 IMP_artifacts.3.desc: "The corpse's eye has been prepared — soaked in grave dirt, inscribed with signs of death, enchanted with the full weight of our necromantic knowledge. Now comes the hardest part.\n\nWith steady hands, we remove our own eye and press the dead one into the socket. The pain is extraordinary. And then — we see. Everything. The spirits, the lingering dead, the lies hiding behind every living face.\n\nThe world will never look the same again."
 IMP_artifacts.3.a: "The price is paid. The sight is mine."
 IMP_witch_eye_crafted_tt: "You have implanted the Witch Eye. It grants necromancy and scheme detection bonuses, but permanently marks your appearance."

 ### Artifact Names and Descriptions
 artifact_shewstone_name: "Shew-Stone"
 artifact_shewstone_description: "A consecrated polished stone painted with bird's blood. Spirits whisper the secrets of those named upon it."

 artifact_nightmare_drums_name: "Nightmare Drums"
 artifact_nightmare_drums_description: "Drums of human skin and bone. Inaudible to the living, they command ghosts to torment a rival's dreams."

 artifact_witch_eye_name: "Witch Eye"
 artifact_witch_eye_description: "An enchanted eye from a restless corpse, implanted in the necromancer's own socket. It grants permanent Deathsight at a terrible cost."

 ### Artifact Decision Tooltips
 imp_requires_cenotaph_path_tt: "Requires knowledge of the Cenotaph Path"
 imp_requires_haunting_path_3_tt: "Requires Haunting Path level 3 or higher"
 imp_requires_necromancy_advanced_tt: "Requires Advanced Necromancy"

 ### Artifact Modifier Localization
 artifact_shewstone_modifier: "Shew-Stone"
 artifact_shewstone_modifier_desc: "Spirits whisper secrets of the named."
 artifact_nightmare_drums_modifier: "Nightmare Drums"
 artifact_nightmare_drums_modifier_desc: "The dead obey the drums' silent call."
 artifact_witch_eye_modifier: "Witch Eye"
 artifact_witch_eye_modifier_desc: "The dead eye sees what the living cannot."
 imp_witch_eye_scarred_modifier: "Scarred by the Witch Eye"
 imp_witch_eye_scarred_modifier_desc: "The self-mutilation required by the Witch Eye ritual has left permanent marks."

 ### ==========================================
 ### FLAVOR EVENTS
 ### ==========================================

 ### Event 1: The Blood Runs Thin
 IMP_flavor.1.t: "The Blood Runs Thin"
 IMP_flavor.1.desc: "Your Bomkazi brings troubling news. The younger generation of mortal witches shows weaker talent than their mothers. The life-magic that once burned in their bloodline is guttering, fading like a candle in the wind.\n\nEach decade, fewer candidates show the spark. The covenant that sustains us — that has sustained us for centuries — may be dying."
 IMP_flavor.1.a: "This troubles me greatly. We must find a solution."
 IMP_flavor.1.b: "I will not let the covenant fail. Not while I endure."
 IMP_flavor.1.c: "The Bomkazi have survived this long. They will endure."

 ### Event 2: A Bomkazi's Passing
 IMP_flavor.2.t: "A Bomkazi's Passing"
 IMP_flavor.2.desc: "The Bomkazi witch is dead. Her life-magic, which sustained us and anchored us to the living world, has gone dark.\n\nThe old rites demand that we guide her soul through the passage between worlds. It is the least we owe to those who give us everything."
 IMP_flavor.2.a: "I will perform the funeral rites. The covenant demands it."
 IMP_flavor.2.b: "I mourn in silence. The dead keep their own counsel."

 ### Event 3: The Necromancer's Offer
 IMP_flavor.3.t: "The Necromancer's Offer"
 IMP_flavor.3.desc: "Word has reached us of a fellow scholar of death — [imp_necromancer_contact.GetName], whose approach to necromancy differs from our own. They have expressed curiosity about our Cenotaph and Haunting paths, knowledge unique to the Impundulu.\n\nPerhaps an exchange of knowledge could benefit us both."
 IMP_flavor.3.a: "I should approach them. Knowledge is power."
 IMP_flavor.3.b: "I am not ready for such an exchange."
 IMP_necromancer_offer_hint_tt: "The 'Exchange Necromantic Knowledge' interaction may be available with this character."

 ### Event 4: Grief of the Founder
 IMP_flavor.4.t: "Grief of the Founder"
 IMP_flavor.4.desc: "In the deep watches of the night, a memory surfaces unbidden — Bomkazi, the first witch-wife. Her face. Her voice. The ritual that bound us together, living and dead, in a covenant neither fully understood.\n\nShe refused the Embrace. She chose mortality, chose to age and wither while we remained unchanged. And yet she stayed. Until the end.\n\nThe centuries have not dulled the grief. Perhaps nothing ever will."
 IMP_flavor.4.a: "I remember you, Bomkazi. I will always remember."
 IMP_flavor.4.b: "The grief has become a companion. Familiar, if not welcome."
